services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-match-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: medical-match-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_ANONYMIZED_TELEMETRY=False
      - ANONYMIZED_TELEMETRY=False
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medical_matching
      
    volumes:
      - chroma_data:/app/data
      - ./reports:/app/reports
      - ./model_cache:/root/.cache/chroma/onnx_models
    depends_on:
      - ollama
      - db

  db:
    image: postgres:15
    container_name: medical-match-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medical_matching
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  ollama_data:
  chroma_data:
  postgres_data:
