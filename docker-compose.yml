version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      # Use host's Ollama instance (host.docker.internal works for Windows/Mac Docker Desktop)
      - OLLAMA_HOST=http://host.docker.internal:11434
      # Overwrite Windows paths so the Linux container uses its built-in tools
      - TESSERACT_PATH=tesseract
      - POPPLER_PATH=
      # Disable ChromaDB telemetry to prevent posthog crash
      - ANONYMIZED_TELEMETRY=False
    env_file:
      - .env
