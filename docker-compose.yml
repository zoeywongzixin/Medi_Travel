version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # This automatically pulls the model when the container starts
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"

  backend:
    build: .
    container_name: medical-match-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      - ollama

volumes:
  ollama_data:
