<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Match - Full Pipeline Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent), 
                              radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.05), transparent);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Outfit'; font-size: 2.5rem; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        .upload-section {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
        
        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn-run {
            grid-column: span 3;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Outfit';
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn-run:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .loading { display: none; text-align: center; margin: 40px 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-section { display: none; animation: fadeInUp 0.6s ease-out; }
        .section-title { font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .package-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        
        .package-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }
        .package-card:hover { transform: scale(1.01); border-color: rgba(99, 102, 241, 0.4); }

        .package-header { padding: 20px; background: rgba(99, 102, 241, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .package-id { font-weight: 700; color: var(--primary); font-family: 'Outfit'; }
        
        .package-body { padding: 24px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
        
        .reasoning { font-style: italic; color: #e2e8f0; margin-bottom: 20px; padding-left: 12px; border-left: 3px solid var(--secondary); line-height: 1.6; }
        
        .detail-item { margin-bottom: 16px; }
        .detail-label { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .detail-value { font-weight: 600; font-size: 1rem; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-top: 5px; }
        .badge-hosp { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .badge-charity { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        .flight-info { background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .btn-run { grid-column: span 1; }
            .package-body { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚀 ASEAN Medical Match</h1>
            <p>End-to-End Pipeline: OCR → Agentic Reasoning → Charity RAG</p>
        </header>

        <section class="upload-section">
            <div class="form-grid">
                <div class="form-group">
                    <label>1. Medical Chart</label>
                    <input type="file" id="medicalFile" accept="image/*,application/pdf">
                </div>
                <div class="form-group">
                    <label>2. Origin Country</label>
                    <select id="originCountry">
                        <option value="Laos">Laos (Lao PDR)</option>
                        <option value="Vietnam">Vietnam</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Cambodia">Cambodia</option>
                        <option value="Myanmar">Myanmar</option>
                        <option value="Thailand">Thailand</option>
                        <option value="Philippines">Philippines</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>3. Budget (USD)</label>
                    <input type="number" id="budgetUsd" value="5000">
                </div>
                <button class="btn-run" id="btnRun" onclick="runPipeline()">Execute Full Agent Flow</button>
            </div>
        </section>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Orchestrating Agents... (OCR → Matching → RAG)</p>
        </div>

        <section class="results-section" id="resultsSection">
            <h2 class="section-title">Recommended Medical Packages</h2>
            <div class="package-grid" id="packageGrid">
                <!-- Packages will be injected here -->
            </div>
        </section>
    </div>

    <script>
        async function runPipeline() {
            const fileInput = document.getElementById('medicalFile');
            const origin = document.getElementById('originCountry').value;
            const budget = document.getElementById('budgetUsd').value;
            const btn = document.getElementById('btnRun');
            const loading = document.getElementById('loading');
            const resultsSection = document.getElementById('resultsSection');
            const grid = document.getElementById('packageGrid');

            if (!fileInput.files[0]) {
                alert("Please select a medical chart image first!");
                return;
            }

            // UI State
            btn.disabled = true;
            loading.style.display = 'block';
            resultsSection.style.display = 'none';
            grid.innerHTML = '';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('origin_country', origin);
            formData.append('budget_usd', budget);

            try {
                const response = await fetch('http://localhost:8000/api/v1/full-pipeline', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Backend error. Make sure app.py is running.");

                const data = await response.json();
                renderResults(data);
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function renderResults(data) {
            const grid = document.getElementById('packageGrid');
            const resultsSection = document.getElementById('resultsSection');
            
            data.recommended_packages.slice(0, 3).forEach((pkg, idx) => {
                const doc = pkg.specialist;
                const flight = pkg.flight_logistics;
                const charities = pkg.recommended_charities || [];
                
                const charHtml = charities.length > 0 
                    ? charities.map(c => `<div class="badge badge-charity">${c.name} (Up to $${c.max_coverage_usd})</div>`).join(' ')
                    : '<span style="color:var(--muted)">No specific funds found</span>';

                const card = document.createElement('div');
                card.className = 'package-card';
                card.innerHTML = `
                    <div class="package-header">
                        <span class="package-id">PACKAGE #${idx + 1}</span>
                        <span style="font-size: 0.8rem; color: var(--muted)">Matching Score Optimized</span>
                    </div>
                    <div class="package-body">
                        <div class="left-col">
                            <div class="reasoning">"${pkg.package_reasoning}"</div>
                            
                            <div class="detail-item">
                                <span class="detail-label">Matched Specialist</span>
                                <span class="detail-value">${doc.name}</span>
                                <div class="badge badge-hosp">${doc.hospital}</div>
                            </div>

                            <div class="detail-item">
                                <span class="detail-label">Specialty</span>
                                <span class="detail-value">${doc.specialty}</span>
                            </div>
                        </div>

                        <div class="right-col">
                            <div class="detail-item">
                                <span class="detail-label">Flight Logistics</span>
                                <div class="flight-info">
                                    <div style="font-size: 0.9rem; font-weight: 600;">${flight.recommendation}</div>
                                    <div style="font-size: 0.75rem; color: var(--muted); margin-top: 5px;">Estimated: ${flight.cost_estimate}</div>
                                </div>
                            </div>

                            <div class="detail-item">
                                <span class="detail-label">Financial Aid RAG Match</span>
                                <div style="display: flex; flex-direction: column; gap: 5px;">
                                    ${charHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            resultsSection.style.display = 'block';
        }
    </script>
</body>
</html>
